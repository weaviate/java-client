name: Tests
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  IMG2VEC: cr.weaviate.io/semitechnologies/img2vec-pytorch:resnet50
  MINIO: minio/minio
  MODEL2VEC: cr.weaviate.io/semitechnologies/model2vec-inference:minishlab-potion-base-4M
  DOCKER_IMAGES_TAR: docker-images.tar

jobs:
  maven-cache:
    name: Cache Maven dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "zulu"
          java-version: "21"
          cache: "maven"
      - run: mvn dependency:go-offline

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: "zulu"
          java-version: "21"
          cache: "maven"
      - run: mvn test -Dtest='!*ITest'

  docker-cache:
    needs: unit
    name: Cache shared Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - id: cache-check
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        env:
          DOCKER_CACHE_KEY: docker-images-${{ env.IMG2VEC }}-${{ env.MINIO }}-${{ env.MODEL2VEC }}
        with:
          path: ${{ env.DOCKER_IMAGES_TAR }}
          key: ${{ env.DOCKER_CACHE_KEY }}
          lookup-only: true # Only check if cache exists, don't download
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false
      - name: Pull images
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          docker pull $IMG2VEC
          docker pull $MINIO
          # docker pull $MODEL2VEC
          docker save $IMG2VEC $MINIO -o $DOCKER_IMAGES_TAR
      - name: Cache images
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        env:
          DOCKER_CACHE_KEY: docker-images-${{ env.IMG2VEC }}-${{ env.MINIO }}-${{ env.MODEL2VEC }}
        with:
          path: ${{ env.DOCKER_IMAGES_TAR }}
          key: ${{ env.DOCKER_CACHE_KEY }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [maven-cache, unit, docker-cache]
    strategy:
      fail-fast: false
      matrix:
        WEAVIATE_VERSION:
          ["1.32.24", "1.33.11", "1.34.7", "1.35.2", "1.36.9", "1.37.0-rc.0"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        env:
          DOCKER_CACHE_KEY: docker-images-${{ env.IMG2VEC }}-${{ env.MINIO }}-${{ env.MODEL2VEC }}
        with:
          path: ${{ env.DOCKER_IMAGES_TAR }}
          key: ${{ env.DOCKER_CACHE_KEY }}
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false
      - name: Load Docker images
        run: |
          if [ -f $DOCKER_IMAGES_TAR ]; then
            docker load -i $DOCKER_IMAGES_TAR
          fi
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        name: Setup JDK
        with:
          distribution: "zulu"
          java-version: "21"
          cache: "maven"

      - name: Run Tests (v${{ matrix.WEAVIATE_VERSION }})
        env:
          OKTA_DUMMY_CI_PW: ${{ secrets.OKTA_DUMMY_CI_PW }}
          WCS_DUMMY_CI_PW: ${{ secrets.WCS_DUMMY_CI_PW }}
          OKTA_CLIENT_SECRET: ${{ secrets.OKTA_CLIENT_SECRET }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          OPENAI_APIKEY: ${{ secrets.OPENAI_APIKEY }}
          WEAVIATE_VERSION: ${{ matrix.WEAVIATE_VERSION }}
        run: mvn verify -Dtest='*ITest' -Dgpg.skip
